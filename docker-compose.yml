services:
  mysql:
    image: mysql:8.4
    container_name: gym-crm-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gymdb
      MYSQL_USER: gym_user
      MYSQL_PASSWORD: gym_password
    volumes:
      - gym-mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  gym-mysql-data:
