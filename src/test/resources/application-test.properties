db.url=jdbc:mysql://localhost:3306/gymdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
db.username=gym_user
db.password=gym_password
db.driver=com.mysql.cj.jdbc.Driver

hibernate.dialect=org.hibernate.dialect.MySQLDialect
hibernate.show_sql=false
hibernate.format_sql=false
hibernate.hbm2ddl.auto=validate

password.validation.pattern=^(?=.*[A-Z])(?=.*[a-z])(?=.*\\d).{8,}$
password.validation.message=Password must be at least 8 characters and contain uppercase, lowercase, and digit
